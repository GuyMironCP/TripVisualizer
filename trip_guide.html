<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌲 Black Forest Family Trip 2026</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --forest:      #2d6a2d;
  --forest-dark: #1a4218;
  --forest-mid:  #3a7d3a;
  --amber:       #f0a000;
  --border:      #d8e8d8;
  --bg:          #f0f4f0;

  --c-nature:    #2e7d32;
  --c-lake:      #0277bd;
  --c-attract:   #e65100;
  --c-drive:     #546e7a;
  --c-flight:    #6a1b9a;
  --c-hotel:     #1565c0;
  --c-city:      #4527a0;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; font-family:'Segoe UI', system-ui, sans-serif; overflow:hidden; }

/* ─── Layout ─────────────────────────────────────────── */
#app    { display:flex; flex-direction:column; height:100vh; }
#topbar { background:linear-gradient(135deg,var(--forest-dark),var(--forest-mid));
          color:#fff; padding:10px 16px; display:flex; align-items:center;
          gap:14px; box-shadow:0 2px 10px rgba(0,0,0,.35); z-index:1000; flex-shrink:0; }
#topbar h1 { font-size:16px; font-weight:700; line-height:1.2; }
#topbar .sub { font-size:11px; opacity:.8; margin-top:2px; }
.stats { margin-left:auto; display:flex; gap:18px; }
.stat  { text-align:center; }
.stat b { display:block; font-size:18px; font-weight:800; }
.stat s { font-size:9px; text-transform:uppercase; opacity:.75; }
#content { display:flex; flex:1; overflow:hidden; }

/* ─── Sidebar ─────────────────────────────────────────── */
#sidebar { width:350px; min-width:350px; background:#fff;
           border-left:1px solid var(--border); display:flex;
           flex-direction:column; overflow:hidden; box-shadow:2px 0 8px rgba(0,0,0,.07); }
#tabs-wrap { padding:10px 10px 8px; background:#f7faf7;
             border-bottom:1px solid var(--border); display:flex; flex-wrap:wrap; gap:5px; }
.tab { padding:4px 9px; border-radius:20px; border:2px solid transparent;
       cursor:pointer; font-size:10px; font-weight:700; background:#eef3ee;
       color:#333; transition:all .18s; user-select:none; }
.tab:hover { transform:translateY(-1px); box-shadow:0 2px 6px rgba(0,0,0,.12); }
.tab.on { background:var(--forest); color:#fff; border-color:var(--forest); }
.tab.all-tab { background:var(--forest-dark); color:#fff; }
.tab.all-tab.on { border-color:var(--amber); }

#panel { flex:1; overflow-y:auto; padding:10px; scroll-behavior:smooth; }
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-thumb { background:#c0d4c0; border-radius:3px; }

/* ─── Summary cards (all-days view) ─────────────────── */
.sum-card { display:flex; align-items:center; gap:10px; padding:9px 11px;
            border-radius:9px; margin-bottom:6px; cursor:pointer;
            border:1px solid #eef3ee; background:#f9fbf9; transition:all .18s; }
.sum-card:hover { background:#eef8ee; transform:translateX(2px); box-shadow:0 2px 8px rgba(0,0,0,.07); }
.sum-num { font-size:24px; font-weight:800; color:var(--forest); opacity:.6; min-width:28px; text-align:center; }
.sum-date { font-size:10px; color:#888; font-weight:600; }
.sum-title { font-size:12px; font-weight:700; color:#1a1a1a; margin:2px 0; }
.sum-sub   { font-size:10px; color:#aaa; }

/* ─── Day header ─────────────────────────────────────── */
.day-hdr { background:linear-gradient(135deg,var(--forest),var(--forest-mid));
           color:#fff; padding:12px 14px; border-radius:10px; margin-bottom:10px; }
.day-hdr .dh-date  { font-size:18px; font-weight:800; }
.day-hdr .dh-title { font-size:13px; opacity:.9; margin-top:2px; }
.day-hdr .dh-hotel { display:inline-block; background:rgba(255,255,255,.2);
                      padding:2px 9px; border-radius:12px; font-size:10px; margin-top:6px; }

/* ─── Activity cards ─────────────────────────────────── */
.act { display:flex; gap:9px; padding:9px 11px; border-radius:8px;
       margin-bottom:7px; cursor:pointer; border:1.5px solid transparent;
       transition:all .18s; }
.act:hover { transform:translateX(3px); box-shadow:0 2px 8px rgba(0,0,0,.1); }
.act.selected { border-color:currentColor; box-shadow:0 2px 10px rgba(0,0,0,.15); }
.act.nature    { background:#e8f5e9; color:var(--c-nature); }
.act.lake      { background:#e1f5fe; color:var(--c-lake); }
.act.attraction{ background:#fff3e0; color:var(--c-attract); }
.act.drive     { background:#eceff1; color:var(--c-drive); }
.act.flight    { background:#f3e5f5; color:var(--c-flight); }
.act.hotel     { background:#e3f2fd; color:var(--c-hotel); }
.act.city      { background:#ede7f6; color:var(--c-city); }
.act-ico  { font-size:19px; width:28px; text-align:center; flex-shrink:0; padding-top:2px; }
.act-time { font-size:9px; font-weight:700; opacity:.75; margin-bottom:1px; }
.act-name { font-size:12px; font-weight:700; color:#1a1a1a; line-height:1.3; }
.act-note { font-size:10px; color:#777; margin-top:2px; line-height:1.4; }

/* ─── Legend ─────────────────────────────────────────── */
#legend { padding:8px 10px; border-top:1px solid var(--border);
          background:#f7faf7; display:flex; flex-wrap:wrap; gap:8px; }
.leg { display:flex; align-items:center; gap:4px; font-size:9.5px; color:#555; }
.leg-dot { width:9px; height:9px; border-radius:50%; }

/* ─── Map ─────────────────────────────────────────────── */
#map { flex:1; }

/* ─── Custom markers ─────────────────────────────────── */
.mk { border-radius:50%; display:flex; align-items:center; justify-content:center;
      border:3px solid rgba(255,255,255,.95); box-shadow:0 2px 8px rgba(0,0,0,.4);
      transition:transform .15s; cursor:pointer; font-size:15px; }
.mk:hover { transform:scale(1.18) !important; }
.mk.pulse { animation:pulse 1.6s infinite; }
@keyframes pulse { 0%,100%{box-shadow:0 2px 8px rgba(0,0,0,.4);} 50%{box-shadow:0 0 0 6px rgba(45,106,45,.3),0 2px 8px rgba(0,0,0,.4);} }

/* ─── Leaflet popup overrides ────────────────────────── */
.leaflet-popup-content-wrapper {
  border-radius:12px !important; padding:0 !important;
  box-shadow:0 6px 28px rgba(0,0,0,.22) !important;
  overflow:hidden; min-width:270px;
}
.leaflet-popup-content { margin:0 !important; width:auto !important; }
.leaflet-popup-tip-container { margin-top:-1px; }
.pop { font-family:'Segoe UI',sans-serif; direction:rtl; }
.pop-head { padding:11px 14px 9px; color:#fff; }
.pop-type  { font-size:10px; font-weight:700; opacity:.85; margin-bottom:2px; }
.pop-name  { font-size:15px; font-weight:800; line-height:1.25; }
.pop-body  { padding:10px 14px 12px; background:#fff; }
.pop-meta  { font-size:10px; color:#888; background:#f5f7f5;
             padding:5px 8px; border-radius:6px; margin-bottom:8px; display:flex; gap:10px; }
.pop-desc  { font-size:12px; color:#333; line-height:1.65; margin-bottom:10px; }
.pop-link  { display:block; text-align:center; color:#fff !important;
             padding:7px 14px; border-radius:7px; font-size:11px; font-weight:700;
             text-decoration:none !important; transition:opacity .15s; }
.pop-link:hover { opacity:.85; }

@media(max-width:700px){
  #content{flex-direction:column;}
  #sidebar{width:100%;min-width:0;height:45vh;}
  #map{height:55vh;}
}

/* ─── Online/Offline toggle button ─────────────────── */
.btn-mode { padding:6px 14px; border-radius:20px; border:2px solid rgba(255,255,255,.35);
            background:rgba(255,255,255,.12); color:#fff; cursor:pointer; font-size:11px;
            font-weight:700; transition:all .2s; white-space:nowrap; }
.btn-mode:hover { background:rgba(255,255,255,.28); border-color:rgba(255,255,255,.65); }
.btn-mode.online { background:#2e7d32; border-color:#66bb6a; }
.btn-mode.loading { opacity:.65; cursor:wait; pointer-events:none; }

/* ─── Distance badge on drive cards ────────────────── */
.dist-badge { display:inline-block; background:rgba(84,110,122,.1);
              border:1px solid rgba(84,110,122,.22); border-radius:8px;
              padding:1px 6px; font-size:9px; font-weight:600;
              color:#455a64; margin-right:3px; vertical-align:middle; }

/* ─── Weather floating panel ───────────────────────── */
.wp { background:#fff; border-radius:12px; overflow:hidden;
      box-shadow:0 4px 24px rgba(0,0,0,.22); min-width:315px;
      font-family:'Segoe UI',sans-serif; }
.wp-head { background:linear-gradient(135deg,#0277bd,#039be5); color:#fff;
           padding:9px 12px; display:flex; align-items:center; gap:8px;
           cursor:pointer; user-select:none; }
.wp-head-lbl { font-size:12px; font-weight:700; flex:1; }
.wp-upd { font-size:9px; opacity:.75; margin-top:1px; }
.wp-tbtn { background:rgba(255,255,255,.2); border:none; color:#fff;
           border-radius:4px; padding:2px 8px; cursor:pointer; font-size:11px; }
.wp-body { padding:10px 12px 12px; }
.wp-days { display:flex; gap:5px; overflow-x:auto; padding-bottom:3px; }
.wp-days::-webkit-scrollbar { height:3px; }
.wp-days::-webkit-scrollbar-thumb { background:#b0c8e0; border-radius:2px; }
.wp-day { min-width:50px; text-align:center; padding:6px 3px 5px; border-radius:8px;
          background:#f0f7ff; border:1.5px solid transparent; flex-shrink:0; }
.wp-day.today { border-color:#0277bd; background:#e3f2fd; }
.wp-day .wd   { font-size:8px; color:#888; font-weight:700; }
.wp-day .wdt  { font-size:8px; color:#aaa; margin-bottom:2px; }
.wp-day .wico { font-size:19px; margin:2px 0; }
.wp-day .wmax { font-size:12px; font-weight:800; color:#c62828; }
.wp-day .wmin { font-size:10px; color:#0277bd; }
.wp-day .wppt { font-size:8px; color:#546e7a; margin-top:1px; }
.wp-source { font-size:9px; color:#bbb; text-align:right; margin-top:7px; }

/* ─── Activity weather badges ───────────────────────── */
.w-badge { display:inline-flex; align-items:center; gap:3px;
           padding:2px 7px; border-radius:10px; font-size:10px;
           font-weight:700; margin-top:5px; }
.w-badge.sun   { background:rgba(245,127,23,.1);  border:1px solid rgba(245,127,23,.28); color:#e65100; }
.w-badge.cloud { background:rgba(84,110,122,.09); border:1px solid rgba(84,110,122,.2);  color:#546e7a; }
.w-badge.rain  { background:rgba(2,119,189,.1);   border:1px solid rgba(2,119,189,.28);  color:#0277bd; }
</style>
</head>
<body>
<div id="app">

<!-- ── Top bar ───────────────────────────────────────── -->
<div id="topbar">
  <div style="font-size:30px">🌲</div>
  <div>
    <h1>Black Forest Family Trip · יולי 2026</h1>
    <div class="sub">Black Forest · Germany · יולי 2026</div>
  </div>
  <div class="stats">
    <div class="stat"><b>10</b><s>ימים</s></div>
    <div class="stat"><b>21</b><s>מקומות</s></div>
    <div class="stat"><b>2</b><s>מלונות</s></div>
  </div>
  <button class="btn-mode" id="btn-online" onclick="toggleOnline()">⚡ מצב אונליין</button>
</div>

<div id="content">

  <!-- ── Sidebar ──────────────────────────────────────── -->
  <div id="sidebar">
    <div id="tabs-wrap">
      <div class="tab all-tab on" onclick="selDay('all')">כל הימים</div>
    </div>
    <div id="panel"></div>
    <div id="legend">

      <div class="leg"><div class="leg-dot" style="background:var(--c-attract)"></div>אטרקציות</div>
      <div class="leg"><div class="leg-dot" style="background:var(--c-city)"></div>ערים / תרבות</div>
      <div class="leg"><div class="leg-dot" style="background:var(--c-hotel)"></div>מלונות</div>
      <div class="leg"><div class="leg-dot" style="background:var(--c-flight)"></div>טיסות</div>
    </div>
  </div>

  <!-- ── Map ──────────────────────────────────────────── -->
  <div id="map"></div>
</div>
</div>

<script>

// ── Build marker icon ──
function mkIcon(type, sz=34) {
  const cfg = T[type]||T.nature;
  return L.divIcon({
    html:`<div class="mk" style="width:${sz}px;height:${sz}px;background:${cfg.color}">${cfg.icon}</div>`,
    className:'', iconSize:[sz,sz], iconAnchor:[sz/2,sz/2], popupAnchor:[0,-sz/2-4]
  });
}

// ── Build popup HTML ──
function buildPop(act, dayInfo) {
  const cfg = T[act.type]||T.nature;
  return `
  <div class="pop">
    <div class="pop-head" style="background:${cfg.color}">
      <div class="pop-type">${cfg.icon} ${cfg.label}${dayInfo ? ` · ${dayInfo.date} ${dayInfo.dow}` : ''}</div>
      <div class="pop-name">${act.name}</div>
    </div>
    <div class="pop-body">
      <div class="pop-meta">
        <span>⏰ ${act.time}</span>
        <span>⏱ ${act.duration||'—'}</span>
      </div>
      <div class="pop-desc">${act.desc}</div>
      <a class="pop-link" style="background:${cfg.color}" href="${act.url}" target="_blank"
         onclick="event.stopPropagation()">🌐 ${act.urlLabel}</a>
    </div>
  </div>`;
}

// ── Activity markers ──
DAYS.forEach(day=>{
  day.activities.forEach(act=>{
    if(act.type==='drive') return;
    const m=L.marker(act.coords,{icon:mkIcon(act.type),zIndexOffset:100})
      .bindPopup(buildPop(act,day),{maxWidth:300})
      .addTo(map);
    allMks.push({m, dayIds:[day.id], type:act.type, act, day});
  });
});

// ── Route lines ──
function drawRoute(dayId){
  clearRoutes();
  const day=DAYS[dayId];
  const pts=day.activities.map(a=>a.coords);
  if(pts.length>1){
    const ln=L.polyline(pts,{color:'#2d6a2d',weight:2.5,opacity:.55,dashArray:'8,6'}).addTo(map);
    routeLayers.push(ln);
  }
}
function clearRoutes(){routeLayers.forEach(l=>map.removeLayer(l));routeLayers=[];}

// ── Marker filter ──
function filterMks(dayId){
  allMks.forEach(({m,dayIds,type})=>{
    const show=dayId==='all'||type==='hotel'||(Array.isArray(dayIds)&&dayIds.includes(dayId));
    m.setOpacity(show?1:0.12);
    if(m._icon) m._icon.style.pointerEvents=show?'auto':'none';
  });
}

// ── Fit bounds ──
function fitDay(dayId){
  const pts=DAYS[dayId].activities.map(a=>a.coords);
  if(pts.length) map.fitBounds(L.latLngBounds(pts).pad(0.25),{animate:true,duration:.8});
}

// ── Focus on activity from sidebar click ──
function focusAct(dayId,actIdx){
  const act=DAYS[dayId].activities[actIdx];
  document.querySelectorAll('.act').forEach(e=>e.classList.remove('selected'));
  const el=document.getElementById(`act-${dayId}-${actIdx}`);
  if(el){el.classList.add('selected');el.scrollIntoView({behavior:'smooth',block:'nearest'});}
  map.setView(act.coords,13,{animate:true});
  allMks.forEach(({m,act:mAct,day:mDay})=>{
    if(mDay&&mDay.id===dayId&&mAct&&mAct.coords[0]===act.coords[0]) m.openPopup();
  });
}

// ── Select day ──
function selDay(dayId){
  activeDay=dayId;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  if(dayId==='all'){
    document.querySelector('.all-tab').classList.add('on');
    clearRoutes(); filterMks('all');
    map.flyTo([47.92,8.25],9,{duration:1});
    renderSummary();
  } else {
    const tabs=[...document.querySelectorAll('.tab:not(.all-tab)')];
    if(tabs[dayId]) tabs[dayId].classList.add('on');
    drawRoute(dayId); filterMks(dayId); fitDay(dayId);
    renderDay(dayId);
  }
}

// Format temp: single value or range when two models differ >1°
function fmtTemp(a,b){
  if(b==null) return `${a}°`;
  const d=Math.abs(a-b);
  if(d<=1) return `${Math.round((a+b)/2)}°`;
  return `${Math.min(a,b)}°–${Math.max(a,b)}°`;
}

// ── Fetch from two Open-Meteo models; returns {d1,d2} ─────────
// Model 1: Open-Meteo global seamless blend
// Model 2: DWD ICON (German national weather service — best for Black Forest)
// Elevation correction applied automatically for mountain coords.
async function fetchWeather(lat,lon){
  const elevKey=`${lat},${lon}`;
  const elev=ELEV[elevKey]||null;
  const cKey=`${lat.toFixed(1)},${lon.toFixed(1)}${elev?'@'+elev:''}`;
  if(wCache[cKey]) return wCache[cKey];

  const params=`?latitude=${lat}&longitude=${lon}`+
    `&daily=temperature_2m_max,temperature_2m_min,weathercode,precipitation_sum`+
    `&timezone=Europe%2FBerlin&start_date=2026-07-15&end_date=2026-07-25`+
    (elev?`&elevation=${elev}`:'');
  const base=`https://api.open-meteo.com/v1/forecast`;

  const [r1,r2]=await Promise.allSettled([
    fetch(base+params).then(r=>r.json()),
    fetch(base+params+'&models=icon_seamless').then(r=>r.json())
  ]);
  const result={
    d1:r1.status==='fulfilled'?r1.value.daily:null,
    d2:r2.status==='fulfilled'?r2.value.daily:null,
    elev
  };
  wCache[cKey]=result;
  return result;
}

// ── Render day cards in the floating weather panel ────────────
function renderWeatherPanel(h1,h2){
  const cont=document.getElementById('wp-days');
  if(!cont) return;
  const upd=document.getElementById('wp-upd');
  if(upd) upd.textContent=new Date().toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});
  cont.innerHTML=TRIP_ISO.map((iso,i)=>{
    const src=i<6?h1:h2;
    if(!src) return '';
    const {d1,d2}=src;
    const si1=d1?d1.time.indexOf(iso):-1;
    const si2=d2?d2.time.indexOf(iso):-1;
    if(si1<0&&si2<0) return '';
    const wmo=si1>=0?d1.weathercode[si1]:d2.weathercode[si2];
    const [ico]=getWMO(wmo);
    const max1=si1>=0?Math.round(d1.temperature_2m_max[si1]):null;
    const max2=si2>=0?Math.round(d2.temperature_2m_max[si2]):null;
    const min1=si1>=0?Math.round(d1.temperature_2m_min[si1]):null;
    const min2=si2>=0?Math.round(d2.temperature_2m_min[si2]):null;
    const rain=si1>=0?d1.precipitation_sum[si1]:(si2>=0?d2.precipitation_sum[si2]:0);
    return `<div class="wp-day" style="cursor:pointer" onclick="selDay(${i})" title="${DAYS[i]?.title||''}">
      <div class="wd">יום ${TRIP_DOW[i]}</div>
      <div class="wdt">${TRIP_DD[i]}/07</div>
      <div class="wico">${ico}</div>
      <div class="wmax">${fmtTemp(max1,max2)}</div>
      <div class="wmin">${fmtTemp(min1,min2)}</div>
      ${rain>0.5?`<div class="wppt">💧${rain.toFixed(0)}מ"מ</div>`:''}
    </div>`;
  }).join('');
}

// ── Inject weather badges into activity cards of current day ──
async function updateDayBadges(dayId){
  if(!onlineMode||dayId==='all') return;
  const day=DAYS[dayId];
  const iso=TRIP_ISO[dayId];
  if(!iso) return;
  for(let i=0;i<day.activities.length;i++){
    const act=day.activities[i];
    if(!act.coords) continue;
    try{
      const {d1,d2,elev}=await fetchWeather(act.coords[0],act.coords[1]);
      const si1=d1?d1.time.indexOf(iso):-1;
      const si2=d2?d2.time.indexOf(iso):-1;
      if(si1<0&&si2<0) continue;
      const el=document.getElementById(`wbadge-${dayId}-${i}`);
      if(!el) continue;
      const wmo=si1>=0?d1.weathercode[si1]:d2.weathercode[si2];
      const [ico]=getWMO(wmo);
      const max1=si1>=0?Math.round(d1.temperature_2m_max[si1]):null;
      const max2=si2>=0?Math.round(d2.temperature_2m_max[si2]):null;
      const cls=wmo<=1?'sun':wmo<=3?'cloud':'rain';
      const elevNote=elev?` ⛰${elev}מ'`:'';
      el.innerHTML=` <span class="w-badge ${cls}">${ico} ${fmtTemp(max1,max2)}${elevNote}</span>`;
    }catch(e){}
  }
}

// ── Collapse/expand the weather panel body ────────────────────
function toggleWP(){
  wpCollapsed=!wpCollapsed;
  const b=document.getElementById('wp-body');
  const t=document.getElementById('wp-toggle');
  if(b) b.style.display=wpCollapsed?'none':'';
  if(t) t.textContent=wpCollapsed?'▲':'▼';
}

// ── Leaflet control: floating weather panel ───────────────────
const WPControl=L.Control.extend({
  options:{position:'bottomleft'},
  onAdd(){
    const d=L.DomUtil.create('div','');
    d.id='wp-ctrl';
    d.innerHTML=
      `<div class="wp">
        <div class="wp-head" onclick="toggleWP()">
          <span class="wp-head-lbl">🌤 מזג אוויר · יולי 2026</span>
          <span class="wp-upd" id="wp-upd"></span>
          <button class="wp-tbtn" id="wp-toggle">▼</button>
        </div>
        <div class="wp-body" id="wp-body">
          <div class="wp-days" id="wp-days"></div>
          <div class="wp-source">Open-Meteo global + DWD ICON · ללא API Key</div>
        </div>
      </div>`;
    L.DomEvent.disableClickPropagation(d);
    return d;
  }
});

// ── Toggle online / offline ───────────────────────────────────
async function toggleOnline(){
  const btn=document.getElementById('btn-online');
  onlineMode=!onlineMode;
  if(onlineMode){
    btn.textContent='⏳ טוען...';
    btn.classList.add('loading');
    try{
      if(!map._wpAdded){new WPControl().addTo(map);map._wpAdded=true;}
      const [h1,h2]=await Promise.all([
        fetchWeather(HOTELS[0].coords[0],HOTELS[0].coords[1]),
        fetchWeather(HOTELS[1].coords[0],HOTELS[1].coords[1])
      ]);
      renderWeatherPanel(h1,h2);
      btn.textContent='🌐 אונליין';
      btn.classList.remove('loading');
      btn.classList.add('online');
      if(activeDay!=='all') renderDay(activeDay);
    }catch(e){
      onlineMode=false;
      btn.textContent='⚡ מצב אונליין';
      btn.classList.remove('loading');
      alert('שגיאה בטעינת מזג האוויר. בדוק חיבור לאינטרנט.');
    }
  }else{
    btn.textContent='⚡ מצב אונליין';
    btn.classList.remove('loading','online');
    const wp=document.getElementById('wp-ctrl');
    if(wp) wp.style.display='none';
    if(activeDay!=='all') renderDay(activeDay);
  }
}

// ── Override renderDay: hotel card + distances + weather slots ─
function renderDay(dayId){
  const day=DAYS[dayId];
  const hotel=HOTELS[day.hotel];
  const el=document.getElementById('panel');
  el.innerHTML=`
    <div class="day-hdr">
      <div class="dh-date">${day.date} · ${day.dow}</div>
      <div class="dh-title">${day.title}</div>
      <span class="dh-hotel">🏨 ${hotel.name}</span>
    </div>
    <div class="act hotel" onclick="map.flyTo([${hotel.coords[0]},${hotel.coords[1]}],14,{duration:1.2})">
      <div class="act-ico">🏨</div>
      <div style="flex:1">
        <div class="act-time">לינה הלילה · ${hotel.dates}</div>
        <div class="act-name">${hotel.name}</div>
        <div class="act-note">${hotel.sub}</div>
      </div>
    </div>
    ${day.activities.map((a,i)=>{
      const cfg=T[a.type]||T.nature;
      const dist=a.dist?` <span class="dist-badge">🛣 ${a.dist}</span>`:'';
      return `<div class="act ${a.type}" id="act-${dayId}-${i}" onclick="focusAct(${dayId},${i})">
        <div class="act-ico">${cfg.icon}</div>
        <div style="flex:1">
          <div class="act-time">${a.time}${a.duration?` · ${a.duration}`:''}${dist}<span id="wbadge-${dayId}-${i}"></span></div>
          <div class="act-name">${a.name}</div>
          <div class="act-note">${a.note||''}</div>
        </div>
      </div>`;
    }).join('')}
    <div style="text-align:center;font-size:10px;color:#aaa;margin-top:8px;padding:6px">לחץ על פעילות למיקום במפה</div>`;
  if(onlineMode) updateDayBadges(dayId);
}
</script>
